services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: /
    image: portfolio:latest
    container_name: portfolio
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
